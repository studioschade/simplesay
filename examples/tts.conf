# SimpleSay TTS Configuration
# This file is sourced by endpoint.sh to configure TTS provider

# TTS Provider: piper | espeak-ng | pico2wave
# Default: piper (best quality neural TTS)
TTS_PROVIDER="piper"

# Piper settings (neural TTS, best quality)
# Install: pip install piper-tts
# Voices: https://huggingface.co/rhasspy/piper-voices
PIPER_BIN="/home/alex/.local/bin/piper"
PIPER_VOICE="en_US-amy-medium"
PIPER_VOICES_DIR="/home/alex/piper-voices"

# espeak-ng settings (robotic but reliable, always available)
# Install: apt install espeak-ng
ESPEAK_VOICE="en-us"
ESPEAK_SPEED=150

# pico2wave settings (lightweight, decent quality)
# Install: apt install libttspico-utils
PICO2WAVE_LANG="en-US"

# Audio playback
# Options: aplay | paplay | pw-play (PipeWire)
# Default: auto-detect
AUDIO_PLAYER=""
